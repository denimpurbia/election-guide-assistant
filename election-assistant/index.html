<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Election Guide Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🗳️ Election Guide Assistant</h1>

        <!-- Chatbox -->
        <div id="chatbox"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask about elections...">
            <button onclick="sendMessage()">Send</button>
        </div>

        <!-- Quick Buttons -->
        <div class="buttons">
            <button onclick="quickQuestion('process')">Election Process</button>
            <button onclick="quickQuestion('vote')">How to Vote</button>
            <button onclick="quickQuestion('eligibility')">Eligibility</button>
        </div>

        <!-- Timeline Section -->
        <div class="timeline">
            <h2>📅 Election Timeline</h2>
            <ul>
                <li>📢 Announcement</li>
                <li>📝 Nomination</li>
                <li>📣 Campaign</li>
                <li>🗳️ Voting Day</li>
                <li>📊 Counting</li>
                <li>🏆 Result</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
